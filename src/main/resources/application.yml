server:
  port: 8080

spring:
  application:
    name: my-blog-backend
  # 默认激活 local 档,真实地址/密码放在 application-local.yml(已 gitignore,不入库)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD:}
  # 文件上传大小限制(图片 ≤ 5MB)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true        # 下划线 ↔ 驼峰
  global-config:
    db-config:
      logic-delete-field: is_deleted          # 逻辑删除(article)
      logic-delete-value: 1
      logic-not-delete-value: 0

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket: ${MINIO_BUCKET:blog}

jwt:
  # 真实密钥用环境变量 JWT_SECRET 或 application-local.yml 覆盖;下方仅为本地占位
  secret: ${JWT_SECRET:dev-local-only-secret-please-override-in-prod-min-32-bytes}
  expire-minutes: ${JWT_EXPIRE_MINUTES:1440}

# CORS 白名单(逗号分隔;生产域名用环境变量 CORS_ALLOWED_ORIGINS 注入)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Knife4j 文档:访问 http://localhost:8080/doc.html
knife4j:
  enable: true

logging:
  level:
    org.example.myblogbackend: debug
